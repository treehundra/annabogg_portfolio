<!-- @dsCard group="Colors" viewport="700x150" name="Ink" subtitle="Text, rules and hairlines — a single near-black, scaled" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--font-body); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 72px; border-radius: var(--radius-photo); }
  .name { font-family: var(--font-display); text-transform: uppercase; font-weight: 600; font-size: 12px; letter-spacing: .04em; margin-top: 9px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--ink-300); letter-spacing: .06em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="name">Ink</div><div class="hex">#111111</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="name">700</div><div class="hex">#2E2E2E</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="name">500</div><div class="hex">#5C5C5C</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><div class="name">300</div><div class="hex">#9A9A9A</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-150)"></div><div class="name">150</div><div class="hex">#C9C9C7</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-100);border:1px solid var(--ink-100)"></div><div class="name">100</div><div class="hex">#DEDEDC</div></div>
  </div>
</body>
</html>
