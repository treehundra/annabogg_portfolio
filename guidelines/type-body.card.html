<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: #fff; }
  .lead { font-family: var(--font-body); font-weight: 600; font-size: 20px; line-height: 1.4; color: var(--ink); max-width: 64ch; margin: 0 0 10px; }
  .body { font-family: var(--font-serif); font-size: 16px; line-height: 1.5; color: var(--ink-700); max-width: 66ch; margin: 0; }
  .meta { font-family: var(--font-body); font-weight: 600; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-300); margin-top: 16px; }
</style>
</head>
<body>
  <p class="lead">Стилист, креативный продюсер, ассистент креативного директора.</p>
  <p class="body">Сноб — журнал №111, осень 2025 · L'Officiel — журнал №278, лето 2025 · Sheer Magazine №1.</p>
  <div class="meta">Montserrat 400–800 (UI, captions) · PT Serif (lists, credits)</div>
</body>
</html>
