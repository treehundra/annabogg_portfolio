<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="Hero → micro, across the four voices" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: #fff; font-family: var(--font-body); }
  .line { display: flex; align-items: baseline; gap: 18px; padding: 5px 0; border-bottom: 1px solid var(--ink-100); }
  .line:last-child { border-bottom: none; }
  .tok { font-family: var(--font-body); font-weight: 600; font-size: 10px; letter-spacing: .08em; color: var(--ink-300); width: 120px; flex: none; text-transform: uppercase; }
  .ex { color: var(--ink); }
</style>
</head>
<body>
  <div class="line"><span class="tok">display</span><span class="ex" style="font-family:var(--font-display);text-transform:uppercase;font-weight:800;font-size:40px;line-height:1;letter-spacing:-.01em">Section</span></div>
  <div class="line"><span class="tok">script</span><span class="ex script" style="font-size:34px">Fashion &amp; Creative</span></div>
  <div class="line"><span class="tok">lead · 20</span><span class="ex" style="font-size:20px;font-weight:600">Intro paragraph lead</span></div>
  <div class="line"><span class="tok">serif · 16</span><span class="ex serif" style="font-size:16px">Lists &amp; publication credits</span></div>
  <div class="line"><span class="tok">small · 14</span><span class="ex" style="font-size:14px;color:var(--ink-500)">Captions and meta</span></div>
  <div class="line"><span class="tok">micro · 12</span><span class="ex label-micro" style="color:var(--ink)">SPACED LABEL</span></div>
</body>
</html>
