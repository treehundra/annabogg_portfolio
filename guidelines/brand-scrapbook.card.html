<!-- @dsCard group="Brand" viewport="700x260" name="Scrapbook layout" subtitle="Overlap, tilt, tape down — the printed-zine arrangement" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--font-body); }
  .stage { position: relative; height: 210px; }
  .polaroid { position: absolute; width: 120px; background: #fff; padding: 8px 8px 0; box-shadow: var(--shadow-photo); }
  .polaroid .img { aspect-ratio: 1; background: var(--photo-bg); }
  .polaroid .cap { font-family: var(--font-hand); font-weight: 600; font-size: 15px; text-align: center; color: var(--ink-700); padding: 6px 2px 8px; }
  .tape { position: absolute; width: 78px; height: 24px; background: var(--tape-warm); background-image: var(--tape-sheen); box-shadow: var(--shadow-tape); clip-path: polygon(0 0,100% 0,98% 50%,100% 100%,0 100%,2% 50%); }
  .note { position: absolute; background: var(--paper-cream); box-shadow: var(--shadow-paper); padding: 12px 16px; width: 200px; }
  .note .h { font-family: var(--font-display); text-transform: uppercase; font-weight: 700; font-size: 16px; }
  .note .t { font-size: 12px; color: var(--ink-500); margin-top: 4px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="polaroid" style="left:8px;top:18px;transform:rotate(-5deg)"><div class="img"></div><div class="cap">Sheer SS25</div></div>
    <div class="polaroid" style="left:150px;top:40px;transform:rotate(3deg);z-index:2"><div class="img"></div><div class="cap">L'Officiel</div></div>
    <div class="tape" style="left:188px;top:24px;transform:rotate(-7deg);z-index:3"></div>
    <div class="note" style="left:320px;top:14px;transform:rotate(2deg)"><div class="h">Королева ринга</div><div class="t">Продакшн шоу — стилизация образов участниц проекта.</div></div>
    <div class="note" style="left:360px;top:120px;transform:rotate(-3deg);background:var(--paper-aged)"><div class="h">Ozon Bank</div><div class="t">Кампания с Гошей Куценко.</div></div>
  </div>
</body>
</html>
