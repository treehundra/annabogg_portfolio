<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 30px 34px; background: #fff; display: flex; flex-direction: column; justify-content: center; }
  .kicker { font-family: var(--font-mono); font-size: 12px; letter-spacing: .32em; text-transform: uppercase; color: var(--ink-500); border-bottom: 2px solid var(--ink); padding-bottom: 8px; display: inline-block; }
  .name { font-family: var(--font-display); font-weight: 700; text-transform: uppercase; letter-spacing: .01em; font-size: 64px; line-height: .9; margin: 18px 0 6px; }
  .role { font-family: var(--font-serif); font-style: italic; font-size: 24px; color: var(--ink-500); }
</style>
</head>
<body>
  <span class="kicker">Stylist · Creative Producer · Moscow</span>
  <div class="name">Анна<br />Богомолова</div>
  <div class="role">stylist &amp; creative producer</div>
</body>
</html>
