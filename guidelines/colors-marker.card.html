<!-- @dsCard group="Colors" viewport="700x180" name="Marker red" subtitle="The only accent — used ONLY as a hand-drawn stroke, never a fill" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--font-body); display: flex; gap: 30px; align-items: center; }
  .swatches { display: flex; gap: 14px; }
  .sw { width: 96px; }
  .chip { height: 72px; border-radius: var(--radius-photo); }
  .name { font-family: var(--font-display); text-transform: uppercase; font-weight: 600; font-size: 12px; margin-top: 9px; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--ink-300); letter-spacing: .06em; }
  .demo { flex: 1; }
  .word { position: relative; display: inline-block; font-family: var(--font-display); text-transform: uppercase; font-weight: 700; font-size: 38px; letter-spacing: .02em; }
  .note { font-family: var(--font-mono); font-size: 11px; color: var(--ink-300); letter-spacing: .14em; text-transform: uppercase; margin-top: 22px; }
  .x { color: var(--marker-red); }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:var(--marker-red)"></div><div class="name">Red</div><div class="hex">#E5251D</div></div>
    <div class="sw"><div class="chip" style="background:var(--marker-red-deep)"></div><div class="name">Deep</div><div class="hex">#C2160F</div></div>
  </div>
  <div class="demo">
    <span class="word">ПОРТФОЛИО<svg viewBox="0 0 320 22" preserveAspectRatio="none" style="position:absolute;left:0;right:0;bottom:-10px;width:100%;height:14px;overflow:visible"><path d="M4,13 C46,5 92,17 150,10 C212,3 268,16 316,9" fill="none" stroke="var(--marker-red)" stroke-width="5" stroke-linecap="round"/></svg></span>
    <div class="note"><span class="x">✗</span> never a button / box / background fill &nbsp;·&nbsp; only strokes, circles, underlines</div>
  </div>
</body>
</html>
