<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base rhythm — space-1 … space-10" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--font-mono); display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { width: 26px; background: var(--ink); }
  .t { font-size: 10px; color: var(--ink-300); letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="col"><div class="bar" style="height:4px"></div><div class="t">1·4</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="t">2·8</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="t">3·12</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="t">4·16</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="t">5·24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="t">6·32</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="t">7·48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="t">8·64</div></div>
  <div class="col"><div class="bar" style="height:96px"></div><div class="t">9·96</div></div>
</body>
</html>
